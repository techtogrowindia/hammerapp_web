# NGINX config for admin.hammerapp.in (Admin Dashboard + Mobile API)
#
# This is the HTTP-only base config. Certbot adds the SSL server block and
# the port-80 → 443 redirect automatically when you run:
#   sudo certbot --nginx -d admin.hammerapp.in
#
# Prerequisite: rate-limit zones must exist in the http{} block of
# /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=hammer_api_general:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=hammer_api_auth:10m    rate=1r/s;
#
# Install:
#   sudo cp nginx/admin.hammerapp.in.conf /etc/nginx/sites-available/admin.hammerapp.in
#   sudo ln -sf /etc/nginx/sites-available/admin.hammerapp.in /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d admin.hammerapp.in

server {
    server_name admin.hammerapp.in;
    server_tokens off;

    client_max_body_size 12m;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    # Admin login / NextAuth — strict rate limit
    location /api/auth/ {
        limit_req zone=hammer_api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Mobile auth endpoints — strict rate limit
    location ~ ^/api/technician/(create|login|verify-otp|resend-otp)$ {
        limit_req zone=hammer_api_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # General API
    location /api/ {
        limit_req zone=hammer_api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Uploaded files (served from disk)
    location /uploads/ {
        alias /var/www/hammer-uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Admin dashboard SSR + everything else
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 80;
    listen [::]:80;
}

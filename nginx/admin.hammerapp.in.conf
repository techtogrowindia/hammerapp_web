# NGINX config for admin.hammerapp.in (Admin Dashboard)
# Install: sudo ln -sf /var/www/hammerapp_web/nginx/admin.hammerapp.in.conf \
#                      /etc/nginx/sites-enabled/admin.hammerapp.in

server {
    listen 80;
    server_name admin.hammerapp.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.hammerapp.in;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/admin.hammerapp.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.hammerapp.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Admin: only allow access from known IPs in production
    # Uncomment and set your office/VPN IP to restrict admin dashboard access:
    # allow 1.2.3.4;
    # deny all;

    client_max_body_size 12m;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    # Admin login endpoint — very strict rate limit
    location /api/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # General admin API
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3003;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/hammer-uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# NGINX config for dev.hammerapp.in (Mobile API endpoint)
# Install: sudo ln -sf /var/www/hammerapp_web/nginx/dev.hammerapp.in.conf \
#                      /etc/nginx/sites-enabled/dev.hammerapp.in

# Rate limiting zones — defined at http level in nginx.conf or here with 'limit_req_zone'
# These are named zones; define them once in /etc/nginx/nginx.conf http block:
#   limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=1r/s;

server {
    listen 80;
    server_name dev.hammerapp.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.hammerapp.in;

    # SSL — managed by Certbot (do not edit this block manually)
    ssl_certificate     /etc/letsencrypt/live/dev.hammerapp.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.hammerapp.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (supplement Next.js headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size limit (must be ≥ UPLOAD_MAX_BYTES in src/lib/upload.ts = 10 MB)
    client_max_body_size 12m;

    # Gzip compression
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    # ── Auth endpoints — strict rate limit ───────────────────
    location ~ ^/api/technician/(create|login|verify-otp|resend-otp)$ {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── General API routes ────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s; # longer for file uploads
    }

    # ── Static assets ─────────────────────────────────────────
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3003;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }

    # ── Uploaded files (served directly by Next.js / or static) ──
    location /uploads/ {
        alias /var/www/hammer-uploads/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── Everything else ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
